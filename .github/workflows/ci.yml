name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pandas econ-ark pytest

      - name: Run tests (fast)
        working-directory: Code/Python
        run: pytest tests/ -m "not slow" -v

      - name: Run tests (all)
        working-directory: Code/Python
        run: pytest tests/ -v
        continue-on-error: true

  test-windows-wsl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up WSL (Ubuntu)
        uses: Vampire/setup-wsl@v5
        with:
          distribution: Ubuntu-24.04
          additional-packages: python3 python3-pip python3-venv

      - name: Run tests inside WSL
        shell: wsl-bash {0}
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          pip install numpy scipy matplotlib pandas econ-ark pytest --break-system-packages
          cd Code/Python
          pytest tests/ -m "not slow" -v

      - name: Run tests (all)
        shell: wsl-bash {0}
        run: |
          cd Code/Python
          pytest tests/ -v
        continue-on-error: true

  notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pandas econ-ark jupyter nbconvert ipykernel

      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=600 \
            --ExecutePreprocessor.kernel_name=python3 \
            SolvingMicroDSOPs.ipynb
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check Code/Python/ --output-format=github
        continue-on-error: true
